id: nhanes_low_protein_ingestion
namespace: nhanes
description: |
  Yearly CDC/NCHS ingestion for continuous NHANES 2003-2018 dietary, demographics, and
  fasting-glucose files plus the public-use linked mortality files. This flow builds a
  BigQuery cohort for validating the low-protein mortality hypothesis on the 2003-2018
  linked-mortality window.
  It is deliberately not an exact reproduction of the 2014 Levine paper, because that paper
  used NHANES III rather than continuous NHANES 2003-2018.

labels:
  domain: nhanes
  use_case: low_protein_validation
  source: cdc

triggers:
  - id: yearly_cdc_check
    type: io.kestra.plugin.core.trigger.Schedule
    cron: "0 3 15 1 *"
    timezone: Asia/Kuala_Lumpur
    recoverMissedSchedules: LAST

pluginDefaults:
  - type: io.kestra.plugin.gcp
    values:
      serviceAccount: "{{ secret('GCP_SERVICE_ACCOUNT') }}"
      projectId: "{{ kv('GCP_PROJECT_ID') }}"
      location: "{{ kv('GCP_LOCATION') }}"
      bucket: "{{ kv('GCP_BUCKET_NAME') }}"

tasks:
  - id: bootstrap_gcp
    type: io.kestra.plugin.core.flow.Subflow
    namespace: nhanes
    flowId: gcp_setup
    wait: true
    transmitFailed: true

  - id: dlt_ingestion
    type: io.kestra.plugin.core.flow.WorkingDirectory
    tasks:
      - id: clone_repo
        type: io.kestra.plugin.git.Clone
        url: https://github.com/tysoncheah/nhanes.git
        branch: main
        
      - id: run_dlt_pipeline
        type: io.kestra.plugin.scripts.python.Commands
        containerImage: ghcr.io/kestra-io/pydata:latest
        env:
          GCP_PROJECT_ID: "{{ kv('GCP_PROJECT_ID') }}"
          GCP_DATASET: "{{ kv('GCP_DATASET') }}"
          SCHEMA__NAMING: direct
          DESTINATION__BIGQUERY__CREDENTIALS: "{{ secret('GCP_SERVICE_ACCOUNT') }}"
        beforeCommands:
          - pip install --quiet dlt[gcp] pandas pyarrow requests
        commands:
          - python dlt_pipeline/run_pipeline.py

      - id: upload_manifest
        type: io.kestra.plugin.gcp.gcs.Upload
        from: metadata/manifest.json
        to: "gs://{{ kv('GCP_BUCKET_NAME') }}/nhanes/low_protein_validation/current/metadata/manifest.json"

  - id: build_validation_cohort
    type: io.kestra.plugin.gcp.bigquery.Query
    sql: |
      CREATE OR REPLACE TABLE `{{ kv('GCP_PROJECT_ID') }}.{{ kv('GCP_DATASET') }}.nhanes_lp_validation_cohort_2003_2018`
      PARTITION BY RANGE_BUCKET(CYCLE_START_YEAR, GENERATE_ARRAY(2003, 2019, 2))
      CLUSTER BY PAPER_AGE_BAND, PROTEIN_GROUP_DAY1
      AS
      WITH demo AS (
        SELECT
          *
        FROM `{{ kv('GCP_PROJECT_ID') }}.{{ kv('GCP_DATASET') }}.nhanes_lp_demo_2003_2018`
      ),
      dr1tot AS (
        SELECT
          *
        FROM `{{ kv('GCP_PROJECT_ID') }}.{{ kv('GCP_DATASET') }}.nhanes_lp_dr1tot_2003_2018`
      ),
      dr2tot AS (
        SELECT
          *
        FROM `{{ kv('GCP_PROJECT_ID') }}.{{ kv('GCP_DATASET') }}.nhanes_lp_dr2tot_2003_2018`
      ),
      mortality AS (
        SELECT
          *
        FROM `{{ kv('GCP_PROJECT_ID') }}.{{ kv('GCP_DATASET') }}.nhanes_lp_mortality_2003_2018`
      ),
      glu AS (
        SELECT
          *
        FROM `{{ kv('GCP_PROJECT_ID') }}.{{ kv('GCP_DATASET') }}.nhanes_lp_glu_2003_2018`
      ),
      joined AS (
        SELECT
          d.SEQN,
          d.CYCLE_START_YEAR,
          d.CYCLE_END_YEAR,
          d.CYCLE_LABEL,
          d.SDDSRVYR,
          d.RIDAGEYR AS AGE_YEARS,
          d.RIAGENDR AS SEX_CODE,
          d.RIDRETH1 AS RACE_ETHNICITY_CODE,
          d.DMDEDUC2 AS EDUCATION_CODE,
          d.INDFMPIR AS POVERTY_INCOME_RATIO,
          d.SDMVPSU,
          d.SDMVSTRA,
          d.WTINT2YR,
          d.WTMEC2YR,
          t1.WTDRD1,
          t2.WTDR2D,
          t1.DR1TKCAL,
          t1.DR1TPROT,
          t1.DR1TCARB,
          t1.DR1TTFAT,
          t2.DR2TKCAL,
          t2.DR2TPROT,
          t2.DR2TCARB,
          t2.DR2TTFAT,
          g.WTSAF2YR,
          g.LBXGLU,
          g.LBDGLUSI,
          g.PHAFSTHR,
          g.PHAFSTMN,
          m.ELIGSTAT,
          m.MORTSTAT,
          m.UCOD_LEADING,
          m.DIABETES,
          m.HYPERTEN,
          m.PERMTH_INT,
          m.PERMTH_EXM,
          m.MORTALITY_PUBLIC_RELEASE_YEAR
        FROM demo AS d
        LEFT JOIN dr1tot AS t1
          USING (SEQN, CYCLE_START_YEAR, CYCLE_END_YEAR)
        LEFT JOIN dr2tot AS t2
          USING (SEQN, CYCLE_START_YEAR, CYCLE_END_YEAR)
        LEFT JOIN glu AS g
          USING (SEQN, CYCLE_START_YEAR, CYCLE_END_YEAR)
        LEFT JOIN mortality AS m
          USING (SEQN, CYCLE_START_YEAR, CYCLE_END_YEAR)
        WHERE d.CYCLE_START_YEAR BETWEEN 2003 AND 2017
          AND d.RIDAGEYR >= 50
      )
      SELECT
        *,
        SAFE_DIVIDE(DR1TPROT * 4.0, NULLIF(DR1TKCAL, 0)) AS PROTEIN_PCT_KCAL_DAY1,
        CASE
          WHEN SAFE_DIVIDE(DR1TPROT * 4.0, NULLIF(DR1TKCAL, 0)) < 0.10 THEN 'LOW'
          WHEN SAFE_DIVIDE(DR1TPROT * 4.0, NULLIF(DR1TKCAL, 0)) < 0.20 THEN 'MODERATE'
          ELSE 'HIGH'
        END AS PROTEIN_GROUP_DAY1,
        CASE
          WHEN DR2TKCAL IS NOT NULL AND DR2TPROT IS NOT NULL
            THEN SAFE_DIVIDE(((DR1TPROT + DR2TPROT) / 2.0) * 4.0, NULLIF((DR1TKCAL + DR2TKCAL) / 2.0, 0))
        END AS PROTEIN_PCT_KCAL_MEAN_2DAY,
        CASE
          WHEN AGE_YEARS BETWEEN 50 AND 65 THEN '50_65'
          WHEN AGE_YEARS >= 66 THEN '66_PLUS'
          ELSE NULL
        END AS PAPER_AGE_BAND,
        SAFE_DIVIDE(WTMEC2YR, 8.0) AS WTMEC16YR,
        SAFE_DIVIDE(WTDRD1, 8.0) AS WTDRD1_16YR,
        SAFE_DIVIDE(WTDR2D, 8.0) AS WTDR2D_16YR,
        SAFE_DIVIDE(WTSAF2YR, 8.0) AS WTSAF16YR,
        CAST(MORTSTAT = 1 AS BOOL) AS DIED_DURING_FOLLOWUP,
        CAST(UCOD_LEADING = '002' AS BOOL) AS CANCER_DEATH_FLAG,
        CAST(DIABETES = 1 AS BOOL) AS DIABETES_MCOD_FLAG,
        CASE
          WHEN LBXGLU >= 126 THEN 'DIABETES_RANGE'
          WHEN LBXGLU >= 100 THEN 'PREDIABETES_RANGE'
          WHEN LBXGLU IS NULL THEN 'MISSING'
          ELSE 'NORMAL_RANGE'
        END AS FASTING_GLUCOSE_CATEGORY,
        'Original paper used NHANES III rather than continuous NHANES 2003-2018; this cohort is for validation and extension, not exact replication.' AS COMPARABILITY_NOTE
      FROM joined
      WHERE ELIGSTAT = 1
        AND DR1TKCAL IS NOT NULL
        AND DR1TPROT IS NOT NULL

  - id: build_validation_summary
    type: io.kestra.plugin.gcp.bigquery.Query
    sql: |
      CREATE OR REPLACE TABLE `{{ kv('GCP_PROJECT_ID') }}.{{ kv('GCP_DATASET') }}.nhanes_lp_validation_summary_2003_2018`
      CLUSTER BY PAPER_AGE_BAND, PROTEIN_GROUP_DAY1
      AS
      SELECT
        PAPER_AGE_BAND,
        PROTEIN_GROUP_DAY1,
        COUNT(*) AS SAMPLE_N,
        SUM(WTDRD1_16YR) AS WEIGHTED_POPULATION,
        SUM(CASE WHEN DIED_DURING_FOLLOWUP THEN WTDRD1_16YR ELSE 0 END) AS WEIGHTED_ALL_CAUSE_DEATHS,
        SUM(CASE WHEN CANCER_DEATH_FLAG THEN WTDRD1_16YR ELSE 0 END) AS WEIGHTED_CANCER_DEATHS,
        AVG(PERMTH_INT) AS AVG_FOLLOWUP_MONTHS_FROM_INTERVIEW,
        AVG(PERMTH_EXM) AS AVG_FOLLOWUP_MONTHS_FROM_EXAM
      FROM `{{ kv('GCP_PROJECT_ID') }}.{{ kv('GCP_DATASET') }}.nhanes_lp_validation_cohort_2003_2018`
      GROUP BY PAPER_AGE_BAND, PROTEIN_GROUP_DAY1

  - id: publish_tables
    type: io.kestra.plugin.core.debug.Return
    format: |
      {
        "source_catalog_table": "{{ kv('GCP_PROJECT_ID') }}.{{ kv('GCP_DATASET') }}.nhanes_lp_source_catalog_2003_2018",
        "demo_table": "{{ kv('GCP_PROJECT_ID') }}.{{ kv('GCP_DATASET') }}.nhanes_lp_demo_2003_2018",
        "dr1tot_table": "{{ kv('GCP_PROJECT_ID') }}.{{ kv('GCP_DATASET') }}.nhanes_lp_dr1tot_2003_2018",
        "dr2tot_table": "{{ kv('GCP_PROJECT_ID') }}.{{ kv('GCP_DATASET') }}.nhanes_lp_dr2tot_2003_2018",
        "dr1iff_table": "{{ kv('GCP_PROJECT_ID') }}.{{ kv('GCP_DATASET') }}.nhanes_lp_dr1iff_2003_2018",
        "dr2iff_table": "{{ kv('GCP_PROJECT_ID') }}.{{ kv('GCP_DATASET') }}.nhanes_lp_dr2iff_2003_2018",
        "glu_table": "{{ kv('GCP_PROJECT_ID') }}.{{ kv('GCP_DATASET') }}.nhanes_lp_glu_2003_2018",
        "mortality_table": "{{ kv('GCP_PROJECT_ID') }}.{{ kv('GCP_DATASET') }}.nhanes_lp_mortality_2003_2018",
        "validation_cohort_table": "{{ kv('GCP_PROJECT_ID') }}.{{ kv('GCP_DATASET') }}.nhanes_lp_validation_cohort_2003_2018",
        "validation_summary_table": "{{ kv('GCP_PROJECT_ID') }}.{{ kv('GCP_DATASET') }}.nhanes_lp_validation_summary_2003_2018"
      }
